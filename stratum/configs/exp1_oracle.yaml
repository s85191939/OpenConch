# Experiment 1: Oracle Anchor Proof
# Budget: ~$20 (~4 GPU-hours on A100)
# Goal: Prove that giving attention to the RIGHT tokens recovers accuracy

model:
  backbone: "state-spaces/mamba-130m"
  freeze_backbone: true

data:
  tasks: ["passkey", "single_niah"]
  seq_lengths: [2048, 4096, 8192]
  n_samples_per_task: 200
  passkey_positions: [0.1, 0.25, 0.5, 0.75, 0.9]

attention:
  d_model: 768
  n_heads: 8
  dropout: 0.0  # no dropout for eval-only

eval:
  batch_size: 4
  max_new_tokens: 10

hardware:
  device: "cuda"
  dtype: "float16"

logging:
  wandb_project: "stratum"
  wandb_run: "exp1-oracle"
  output_dir: "results/exp1_oracle"
